/* Row-expand chevron: RIGHT (▶) when closed, DOWN (▼) when open */
function ExpandChevron({ open, size = 10 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 10 10" fill="none" style={{
      transform: open ? "rotate(90deg)" : "rotate(0deg)",
      transition: "transform 0.18s ease", flexShrink: 0, display: "block",
    }}>
      <path d="M3.5 2L7 5L3.5 8" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

/* Section chevron: RIGHT (▶) when closed, DOWN (▼) when open — matches row chevrons */
function SectionChevron({ open }) {
  return (
    <svg width={14} height={14} viewBox="0 0 10 10" fill="none" style={{
      transform: open ? "rotate(90deg)" : "rotate(0deg)",
      transition: "transform 0.2s ease", flexShrink: 0,
    }}>
      <path d="M3.5 2L7 5L3.5 8" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

function Section({ title, subtitle, defaultOpen, children }) {
  const [open, setOpen] = useState(defaultOpen);
  return (
    <div style={{ borderBottom: "1px solid #e5e7eb" }}>
      <button onClick={() => setOpen(!open)} style={{
        display: "flex", alignItems: "center", gap: 10,
        width: "100%", padding: "14px 24px",
        background: open ? "#f8fafc" : "#fff",
        border: "none", cursor: "pointer", fontFamily: "inherit", textAlign: "left",
        transition: "background 0.12s ease",
      }}>
        <SectionChevron open={open} />
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 15, fontWeight: 650, color: "#111" }}>{title}</div>
          {subtitle && <div style={{ fontSize: 12.5, color: "#555", marginTop: 1 }}>{subtitle}</div>}
        </div>
      </button>

/* ───────── FILTER BAR ───────── */
function FilterBar({ filters, activeFilters, onToggle, onReset }) {
  const pl = filters.filter(f => f.group === "pipeline");
  const ql = filters.filter(f => f.group === "quality");
  const Pill = ({ f }) => {
    const active = activeFilters.includes(f.id);
    return (
      <button onClick={() => onToggle(f.id)} style={{
        fontSize: 11.5, padding: "3px 10px", borderRadius: 12,
        background: active ? f.color : "#fff", color: active ? "#fff" : f.color,
        border: `1px solid ${f.color}`, cursor: "pointer", fontFamily: "inherit", fontWeight: 500,
        transition: "all 0.12s ease", display: "flex", alignItems: "center", gap: 5,
      }}>
        {f.dot && <span style={{ width: 7, height: 7, borderRadius: "50%", background: active ? "#fff" : f.color, display: "inline-block", flexShrink: 0 }} />}
        {f.icon && <span style={{ fontSize: 12 }}>{f.icon}</span>}
        {f.label} ({f.count})
      </button>
    );
  };
  return (
    <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center", padding: "10px 24px", background: "#f8fafc", borderBottom: "1px solid #e5e7eb" }}>
      <button onClick={onReset} style={{
        fontSize: 11.5, padding: "3px 10px", borderRadius: 12,
        background: activeFilters.length === 0 ? "#1e3a5f" : "#fff",
        color: activeFilters.length === 0 ? "#fff" : "#555",
        border: "1px solid " + (activeFilters.length === 0 ? "#1e3a5f" : "#d1d5db"),
        cursor: "pointer", fontFamily: "inherit", fontWeight: 500, marginRight: 4,
      }}>All ({filters.reduce((s, f) => s + f.count, 0)})</button>
      <span style={{ fontSize: 10.5, color: "#888", fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.05em" }}>Source type</span>
      {pl.map(f => <Pill key={f.id} f={f} />)}
      <div style={{ width: 1, height: 20, background: "#d1d5db", margin: "0 4px" }} />
      <span style={{ fontSize: 10.5, color: "#888", fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.05em" }}>Data flags</span>
      {ql.map(f => <Pill key={f.id} f={f} />)}
    </div>
  );
}

    { n: "4", label: "HAPI datasets on HDX",       owner: "HAPI team (OCHA)",     ownerColor: "#7e22ce", bg: "#faf5ff", border: "#c4b5fd", desc: "12 global intermediate datasets published to HDX with warning/error flags for transparency." },

  const filterDefs = [

    { id: "partner_hdx",     group: "pipeline", label: "Partner on HDX",         color: "#15803d", dot: true,  count: INDICATORS.filter(i => i.sourceType === "partner_hdx" || i.sourceType === "partner_ext").length },
    { id: "hdx_dataset",     group: "pipeline", label: "HDX dataset",            color: "#b45309", dot: true,  count: INDICATORS.filter(i => i.sourceType === "hdx_dataset").length },
    { id: "ocha_managed",    group: "pipeline", label: "OCHA managed",           color: "#7e22ce", dot: true,  count: INDICATORS.filter(i => i.sourceType === "ocha_managed").length },
    { id: "div_significant", group: "quality",  label: "Significant divergence", color: "#92400e", icon: "⚡", count: INDICATORS.filter(i => i.layer2.divergenceLevel === "significant").length },
    { id: "div_moderate",    group: "quality",  label: "Moderate divergence",    color: "#1e3a5f", icon: "ⓘ", count: INDICATORS.filter(i => i.layer2.divergenceLevel === "moderate").length },
    { id: "lag_unknown",     group: "quality",  label: "Lag not confirmed",      color: "#b45309", icon: "⏱", count: INDICATORS.filter(i => i.layer2.lagStatus === "unknown").length },
  ];

  const filtered = INDICATORS.filter(ind => {
    if (activeFilters.length === 0) return true;
    return activeFilters.some(f => {
      if (f === "partner_hdx")     return ind.sourceType === "partner_hdx" || ind.sourceType === "partner_ext";

      if (f === "div_moderate")    return ind.layer2.divergenceLevel === "moderate";
      if (f === "lag_unknown")     return ind.layer2.lagStatus === "unknown";

  const CW = [115, 230, 230, 230, 230, 230, 230];

  const COL_HDRS = [

    { label: "Stage 2",    sub: "Publication to HDX or API",     w: CW[2],               n: "2",   bg: "#eff6ff", border: "#93c5fd", ownerColor: "#1d4ed8" },
    { label: "Stage 3",    sub: "HAPI standardisation",          w: CW[3],               n: "3",   bg: "#faf5ff", border: "#c4b5fd", ownerColor: "#7e22ce" },
    { label: "Stage 4",    sub: "HAPI intermediate dataset",     w: CW[4],               n: "4",   bg: "#faf5ff", border: "#c4b5fd", ownerColor: "#7e22ce" },
    { label: "Stage 5",    sub: "Database loading",              w: CW[5],               n: "5",   bg: "#faf5ff", border: "#c4b5fd", ownerColor: "#7e22ce" },
    { label: "Stage 6",    sub: "API and CSV outputs",           w: CW[6],               n: "6",   bg: "#faf5ff", border: "#c4b5fd", ownerColor: "#7e22ce" },

      <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
      <style>{`* { box-sizing: border-box; } .mono { font-family: 'SF Mono','Fira Code','Consolas',monospace; } a.src { color: #1d4ed8; text-decoration: none; } a.src:hover { text-decoration: underline; }`}</style>

      {/* Header */}
      <div style={{ background: "#f8fafc", borderBottom: "2px solid #e2e8f0", padding: "28px 24px 22px" }}>
        <div style={{ maxWidth: 860 }}>
          <h1 style={{ fontSize: 22, fontWeight: 700, margin: "0 0 8px", letterSpacing: "-0.3px", color: "#111" }}>How HAPI standardises data</h1>
          <p style={{ fontSize: 14, fontWeight: 600, color: "#333", margin: 0, lineHeight: 1.6 }}>
            The Humanitarian API brings together data from 13 indicators across 4 source types into a single, consistent format.

                            {" · "}{ind.adminLevel}
                          </div>
                          {ind.note && <div style={{ fontSize: 11, color: "#92600e", paddingLeft: 14, marginTop: 3, fontStyle: "italic", lineHeight: 1.35 }}>{ind.note}</div>}
                        </td>

                        {/* Stage 1 */}
                        <td data-bg={rowBg} style={{ padding: "9px 10px", borderBottom: "1px solid #e5e7eb", verticalAlign: "top", background: rowBg, width: CW[1], minWidth: CW[1] }}>
                          <Stage1Cell ind={ind} />
                        </td>

                        {/* Stage 2 */}
                        <td data-bg={rowBg} style={{ padding: "9px 10px", borderBottom: "1px solid #e5e7eb", verticalAlign: "top", background: rowBg, width: CW[2], minWidth: CW[2] }}>
                          <Stage2Cell ind={ind} />
                        </td>

                        {/* Stage 3 — HAPI processes */}
                        <td data-bg={rowBg} style={{ padding: "6px 6px", borderBottom: "1px solid #e5e7eb", verticalAlign: "top", background: rowBg, width: CW[3], minWidth: CW[3] }}>
                          {ind.isException && <div style={{ fontSize: 11, color: "#92600e", marginBottom: 3, fontWeight: 500, fontStyle: "italic" }}>Bypasses standard upstream</div>}
                          {ind.processes.map((p, j) => (
                            <ProcessItem key={j} label={p.name} icon={p.icon} color={st.color}>{p.desc}</ProcessItem>
                          ))}
                        </td>

                        {/* Stage 4 — HAPI dataset */}
                        <td data-bg={rowBg} style={{ padding: "9px 10px", borderBottom: "1px solid #e5e7eb", verticalAlign: "top", background: rowBg, width: CW[4], minWidth: CW[4] }}>
                          {ind.hapiDataset
                            ? <div>
                                <a href={`https://data.humdata.org/dataset/${ind.hapiDataset}`} target="_blank" rel="noopener" style={{ fontSize: 10.5, color: "#1d4ed8", wordBreak: "break-all", textDecoration: "none", lineHeight: 1.4, fontFamily: "monospace" }}>{ind.hapiDataset}</a>
                                <div style={{ fontSize: 11.5, color: "#555", marginTop: 5, lineHeight: 1.35 }}>Includes warning + error flags</div>
                              </div>
                            : <div style={{ fontSize: 12, color: "#92600e", fontStyle: "italic", lineHeight: 1.4 }}>No intermediate dataset. Direct to DB.</div>
                          }
                        </td>

                        {/* Stage 5 — DB loading */}
                        <td data-bg={rowBg} style={{ padding: "9px 10px", borderBottom: "1px solid #e5e7eb", verticalAlign: "top", background: rowBg, width: CW[5], minWidth: CW[5] }}>
                          {ind.dbSteps.map((step, j) => (
                            <div key={j} style={{ fontSize: 12, color: "#333", lineHeight: 1.4, marginBottom: 3, display: "flex", alignItems: "flex-start", gap: 5 }}>
                              <span style={{ color: "#999", fontSize: 7, marginTop: 4, flexShrink: 0 }}>●</span>
                              <span>{DB_LABELS[step]}</span>
                            </div>
                          ))}
                        </td>

                        {/* Stage 6 — Outputs */}
                        <td data-bg={rowBg} style={{ padding: "9px 10px", borderBottom: "1px solid #e5e7eb", verticalAlign: "top", background: rowBg, width: CW[6], minWidth: CW[6] }}>
                          <div style={{ marginBottom: 7 }}>
                            <div style={{ fontSize: 12, fontWeight: 600, color: "#1d4ed8", marginBottom: 2 }}>REST API</div>
                            <code className="mono" style={{ fontSize: 10.5, color: "#333", background: "#f1f5f9", padding: "2px 5px", borderRadius: 3, wordBreak: "break-all", lineHeight: 1.35, display: "inline-block" }}>{ind.endpoint}</code>
                          </div>
                          <div>
                            <div style={{ fontSize: 12, fontWeight: 600, color: "#15803d", marginBottom: 2 }}>CSV on HDX</div>
                            <div style={{ fontSize: 12, color: "#333", lineHeight: 1.35 }}>{ind.csvName} for &#123;country&#125;</div>
                            <div className="mono" style={{ fontSize: 10.5, color: "#555", marginTop: 2 }}>hdx-hapi-&#123;iso3&#125;</div>
                          </div>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}
        </div>
      </Section>

      {/* Section 3: Transformation matrix */}
      <Section title="What standardisation involves" subtitle="12 types of transformation across 13 indicators — Stage 3 (HAPI) only" defaultOpen={true}>
        <div style={{ padding: "4px 24px 20px" }}>
          <p style={{ fontSize: 13.5, fontWeight: 600, color: "#333", margin: "0 0 14px", lineHeight: 1.6, maxWidth: 860 }}>
            This matrix covers Stage 3 only — HAPI's own standardisation work. Numerical values are never changed. All transformations apply to structural fields: location codes, date formats, category labels, sector names, and organisation identifiers.
          </p>
          <div style={{ display: "flex", gap: 20, marginBottom: 14, flexWrap: "wrap", padding: "8px 12px", background: "#f8f9fa", borderRadius: 6, border: "1px solid #e5e7eb" }}>
            {[
              { bg: "#dcfce7", icon: true,   label: "Applies (expand row name for detail)" },
              { bg: "#eff6ff", text: "Aa",   label: "Applies with a specific variant (described in cell)" },
              { bg: "#f9fafb", border: true, label: "Does not apply" },
            ].map((item, i) => (
              <div key={i} style={{ display: "flex", alignItems: "center", gap: 6 }}>
                <div style={{ width: 20, height: 20, borderRadius: 3, background: item.bg, border: item.border ? "1px solid #e5e7eb" : undefined, display: "flex", alignItems: "center", justifyContent: "center" }}>
                  {item.icon ? <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2.5 6.5L5 9L9.5 3.5" stroke="#15803d" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg> : item.text ? <span style={{ fontSize: 8, color: "#374151", fontWeight: 600 }}>{item.text}</span> : null}
                </div>
                <span style={{ fontSize: 12.5, color: "#333" }}>{item.label}</span>
              </div>
            ))}
          </div>
          <div style={{ overflowX: "auto", overflowY: "auto", maxHeight: "70vh", border: "1px solid #e5e7eb", borderRadius: 6 }}>
            <table style={{ borderCollapse: "collapse", minWidth: 1650 }}>
              <thead>
                <tr>
                  <th style={{ position: "sticky", top: 0, left: 0, zIndex: 15, background: "#faf5ff", padding: "8px 12px", fontSize: 12, fontWeight: 700, color: "#111", textAlign: "left", width: 220, minWidth: 220, borderBottom: "2px solid #c4b5fd", borderRight: "2px solid #c4b5fd" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 3 }}>
                      <div style={{ width: 20, height: 20, borderRadius: "50%", background: "#7e22ce", color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10.5, fontWeight: 700, flexShrink: 0 }}>3</div>
                      <span>Transformation type</span>
                    </div>
                    <div style={{ fontSize: 10.5, color: "#7e22ce", fontWeight: 500, paddingLeft: 26 }}>HAPI standardisation · click row to expand</div>
                  </th>
                  {INDICATORS.map((ind, i) => {
                    const st = SOURCE_TYPES[ind.sourceType];
                    const short = ind.name.length > 12 ? ind.name.split(" ")[0] : ind.name;
                    return (
                      <th key={i} style={{ position: "sticky", top: 0, zIndex: 10, background: "#faf5ff", padding: "7px 5px", fontSize: 11, fontWeight: 600, color: "#111", textAlign: "center", width: 110, minWidth: 110, borderBottom: "2px solid #c4b5fd", borderLeft: "1px solid #e9d5ff", lineHeight: 1.25 }}>
                        <div>{short}</div>
                        <div style={{ width: 7, height: 7, borderRadius: "50%", background: st.color, margin: "4px auto 0" }} />
                      </th>
                    );
                  })}
                </tr>
              </thead>
              <tbody>
                {TRANSFORM_TYPES.map((transform, ti) => {
                  const count = INDICATORS.filter(ind => transform.indicators[ind.id] != null).length;
                  const bg = ti % 2 === 0 ? "#fff" : "#fafafa";
                  return (
                    <tr key={ti}>
                      <TransformRowLabel transform={transform} count={count} bg={bg} />
                      {INDICATORS.map((ind, ii) => {
                        const val = transform.indicators[ind.id];
                        const hasVal = val != null;
                        const isSimple = val === "✓";
                        return (
                          <td key={ii} style={{ padding: "7px 5px", borderBottom: "1px solid #e5e7eb", borderLeft: "1px solid #f0f0f0", background: hasVal ? (isSimple ? "#dcfce7" : "#eff6ff") : bg, textAlign: "center", verticalAlign: "middle" }}>
                            {isSimple
                              ? <svg width="14" height="14" viewBox="0 0 12 12" fill="none" style={{ display: "block", margin: "0 auto" }}><path d="M2.5 6.5L5 9L9.5 3.5" stroke="#15803d" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
                              : hasVal
                                ? <div style={{ fontSize: 10, color: "#374151", lineHeight: 1.3, fontWeight: 500 }}>{val}</div>
                                : null
                            }
                          </td>
                        );
                      })}
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      </Section>

      {/* Section 4: How this analysis was developed */}
      <Section title="How this analysis was developed" subtitle="Sources, methods, and confidence levels" defaultOpen={true}>
        <div style={{ padding: "4px 24px 28px", maxWidth: 860 }}>
          <p style={{ fontSize: 13.5, fontWeight: 600, color: "#333", margin: "0 0 20px", lineHeight: 1.6 }}>
            This visualisation was built by systematically examining the technical evidence available in public sources — principally the HAPI GitHub organisation, the HDX platform, and the HAPI API documentation. No proprietary or internal OCHA systems were accessed. The analysis represents what can be observed from outside the pipeline, supplemented by reasonable inference where direct evidence was not available.
          </p>

          {/* Source types */}
          <div style={{ marginBottom: 24 }}>
            <div style={{ fontSize: 13, fontWeight: 650, color: "#111", marginBottom: 12 }}>What was examined</div>
            {[
              {
                icon: "⌥",
                color: "#1d4ed8",
                bg: "#eff6ff",
                border: "#93c5fd",
                title: "GitHub repositories (OCHA-DAP organisation)",
                body: "The primary technical source. Each of the 13 upstream scraper repositories — for example hdx-scraper-acled, hdx-scraper-fts, hdx-scraper-iom-dtm — was reviewed. This included the Python source code (to understand what transformations are applied), the GitHub Actions workflow files (to determine how frequently each scraper runs), and commit histories and README files (to identify any known issues, inactive processes, or special handling). The central hapi-pipelines-prod repository, which coordinates loading standardised data into the PostgreSQL database, was also reviewed.",
              },
              {
                icon: "⬡",
                color: "#15803d",
                bg: "#f0fdf4",
                border: "#86efac",
                title: "HDX (Humanitarian Data Exchange)",
                body: "The 12 HAPI intermediate datasets published on HDX were reviewed to understand dataset naming conventions, the warning and error flag columns included for transparency, and the relationship between partner-published datasets and HAPI's own outputs. Partner organisation pages on HDX were also checked to understand how data is deposited and at what frequency.",
              },
              {
                icon: "◈",
                color: "#7e22ce",
                bg: "#faf5ff",
                border: "#c4b5fd",
                title: "HAPI API documentation and endpoints",
                body: "The public HAPI API documentation was used to verify the structure of the outputs — which endpoints exist, what fields are exposed, and how data is organised at country level. This helped confirm what is and is not retained as data moves from partner sources through to the final API response.",
              },
              {
                icon: "◎",
                color: "#b45309",
                bg: "#fffbeb",
                border: "#cbd5e1",
                title: "Partner API and data documentation",
                body: "Where partners publish their own technical documentation — for example ACLED's codebook, the FTS API reference, and the DTM API documentation — these were reviewed to understand what data is available upstream and how it compares to what HAPI ultimately exposes. This comparison is the basis for the divergence assessments in the pipeline table.",
              },
            ].map((item, i) => (
              <div key={i} style={{ display: "flex", gap: 12, marginBottom: 12 }}>
                <div style={{ width: 32, height: 32, borderRadius: 6, background: item.bg, border: `1.5px solid ${item.border}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14, color: item.color, flexShrink: 0, marginTop: 1 }}>{item.icon}</div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 13, fontWeight: 650, color: "#111", marginBottom: 3 }}>{item.title}</div>
                  <div style={{ fontSize: 13, color: "#555", lineHeight: 1.6 }}>{item.body}</div>
                </div>
              </div>
            ))}
          </div>

          {/* Confidence levels */}
          <div style={{ marginBottom: 24 }}>
            <div style={{ fontSize: 13, fontWeight: 650, color: "#111", marginBottom: 10 }}>Confidence levels</div>
            <p style={{ fontSize: 13.5, color: "#444", margin: "0 0 12px", lineHeight: 1.6, maxWidth: 700 }}>
              Each piece of information in this visualisation carries one of three confidence markers, visible in the References section of each indicator row.
            </p>
            {[
              { mark: "✓", label: "Confirmed", color: "#15803d", bg: "#f0fdf4", border: "#86efac", desc: "Directly evidenced by source code, workflow configuration files, or official documentation. The claim can be verified by anyone with access to the same public sources." },
              { mark: "~", label: "Inferred", color: "#b45309", bg: "#fffbeb", border: "#e5e7eb", desc: "Based on consistent patterns observed across multiple repositories or datasets, but not explicitly stated in documentation. For example, scraper cadence for some indicators was inferred from workflow schedule expressions rather than a published statement." },
              { mark: "?", label: "Not publicly documented", color: "#6b7280", bg: "#f9fafb", border: "#e5e7eb", desc: "The information could not be confirmed from public sources. This typically applies to partner-side processes — how a partner collects, cleans, or approves data before publication — which are internal to the partner organisation and not visible from outside." },
            ].map((item, i) => (
              <div key={i} style={{ display: "flex", gap: 10, marginBottom: 8, alignItems: "flex-start" }}>
                <div style={{ width: 26, height: 26, borderRadius: 4, background: item.bg, border: `1px solid ${item.border}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 700, color: item.color, flexShrink: 0 }}>{item.mark}</div>
                <div style={{ flex: 1 }}>
                  <span style={{ fontSize: 13, fontWeight: 650, color: item.color }}>{item.label} — </span>
                  <span style={{ fontSize: 13, color: "#555", lineHeight: 1.6 }}>{item.desc}</span>
                </div>
              </div>
            ))}
          </div>

          {/* Limitations */}
          <div style={{ marginBottom: 8 }}>
            <div style={{ fontSize: 13, fontWeight: 650, color: "#111", marginBottom: 10 }}>Known limitations</div>
            <p style={{ fontSize: 13.5, color: "#444", margin: "0 0 10px", lineHeight: 1.6, maxWidth: 700 }}>
              Three points should be kept in mind when interpreting this analysis.
            </p>
            {[
              { title: "Partner-side processes are largely opaque", body: "Stages 1 and 2 — partner data production and publication — are outside HAPI's control and often outside its visibility. How individual partners collect, validate, and approve data before it reaches HDX or their API is generally not documented in public sources. The summaries in this visualisation are based on partner websites, published methodology notes, and codebooks where available, but should not be taken as a complete account of any partner's internal process." },
              { title: "Three automated schedulers are currently inactive", body: "The GitHub Actions workflows for IOM DTM (hdx-scraper-iom-dtm), IPC (hdx-scraper-ipc), and HNO (hdx-scraper-hno) have their automated schedules commented out, meaning these scrapers run only when manually triggered. This was observed in the workflow configuration files at the time of analysis and should be verified with the HAPI technical team before drawing conclusions about update frequency for those indicators." },
              { title: "Code reflects a point in time", body: "GitHub repositories change. The transformation logic, scheduling, and data handling described here reflect the state of the codebase at the time this analysis was conducted. The HAPI team should be consulted to confirm whether any material changes have been made since." },
            ].map((item, i) => (
              <div key={i} style={{ paddingLeft: 14, borderLeft: "3px solid #e5e7eb", marginBottom: 12 }}>
                <div style={{ fontSize: 13, fontWeight: 650, color: "#111", marginBottom: 3 }}>{item.title}</div>
                <div style={{ fontSize: 13, color: "#555", lineHeight: 1.6 }}>{item.body}</div>
              </div>
            ))}
          </div>
        </div>
      </Section>
    </div>
  );
}
    ReactDOM.createRoot(document.getElementById('root')).render(<HAPIPipelineViz />);
  </script>
</body>
</html>
